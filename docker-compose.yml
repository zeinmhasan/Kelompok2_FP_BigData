networks:
  aira-net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aira-zookeeper
    networks:
      - aira-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aira-kafka
    networks:
      - aira-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: aira-namenode
    hostname: namenode
    networks:
      - aira-net
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=aira-cluster
    env_file:
      - .env

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: aira-datanode
    hostname: datanode
    networks:
      - aira-net
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - .env

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: aira-spark-master
    hostname: spark-master
    networks:
      - aira-net
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - INIT_DAEMON_STEP=setup_spark
    volumes:
      - ./spark/spark_job.py:/opt/spark_job.py


  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: aira-spark-worker
    networks:
      - aira-net
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./spark/spark_job.py:/opt/spark_job.py

  producer:
    build: ./producer
    container_name: aira-producer
    networks:
      - aira-net
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:29092
      - AQICN_TOKEN=${AQICN_TOKEN}
      - OPENWEATHER_KEY=${OPENWEATHER_KEY}
      - TOMTOM_KEY=${TOMTOM_KEY}
      - OPENUV_KEY=${OPENUV_KEY}
    restart: unless-stopped

  consumer:
    build: ./consumer
    container_name: aira-consumer
    networks:
      - aira-net
    depends_on:
      - kafka
      - namenode
      - datanode
    environment:
      - KAFKA_BROKER=kafka:29092
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: aira-dashboard
    networks:
      - aira-net
    depends_on:
      - namenode
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  scheduler:
    build: ./scheduler
    container_name: aira-scheduler
    networks:
      - aira-net
    depends_on:
      - spark-master
      - namenode
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./spark/spark_job.py:/opt/spark_job.py
    restart: unless-stopped

  ml-serving:
    build: ./ml-serving-docker
    container_name: aira-ml-serving
    networks:
      - aira-net
    depends_on:
      - namenode
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
